name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKERACC }}
        password: ${{ secrets.DOCKERPWD }}
    - name: Build and Push
      run: |
        docker build . --file Dockerfile --tag rzdpai/Huawei_Cloud_Webdav:latest
        docker push rzdpai/Huawei_Cloud_Webdav:latest
